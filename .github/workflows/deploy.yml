name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # This forces the job onto GitHub's cloud runners

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro site
        run: pnpm run build

      - name: Deploy via SSH and rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # 1. Create the .ssh directory
          mkdir -p ~/.ssh

          # 2. Securely write the private key and fix permissions
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 3. Add your server to known_hosts so the connection doesn't hang asking for confirmation
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

          # 4. Sync the dist folder to the server
          rsync -avz --delete ./dist/ $SSH_USER@$SSH_HOST:/var/www/html/
